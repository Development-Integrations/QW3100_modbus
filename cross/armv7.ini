# Meson cross-file para arm-linux-gnueabihf (ARMv7 hard-float)
#
# Uso:
#   meson setup build-arm --cross-file cross/armv7.ini
#   meson compile -C build-arm
#
# Prerequisito: apt install gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf
# Dependencias: compilar primero con  scripts/build_third_party.sh

[binaries]
c       = 'arm-linux-gnueabihf-gcc'
cpp     = 'arm-linux-gnueabihf-g++'
ar      = 'arm-linux-gnueabihf-ar'
strip   = 'arm-linux-gnueabihf-strip'
pkg-config = 'pkg-config'

[built-in options]
# Linking completamente estático — sin .so en el dispositivo
c_link_args = ['-static']

[host_machine]
system     = 'linux'
cpu_family = 'arm'
cpu        = 'cortex-a9'
endian     = 'little'
